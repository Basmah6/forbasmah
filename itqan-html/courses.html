</head><body>

            <button class="pill" onclick="setLang(getLang()==='en'?'ar':'en')">
        🌐 <span data-i18n="lang.toggle" style="display:none;"></span>

<section class="hero" style="border-bottom:1px solid color-mix(in oklch,var(--border) 60%,transparent)">
  <div class="hero-bg"></div>
  <div class="container text-center" style="padding:5rem 1.5rem">

  </div>
</section>
<main class="container" style="padding:4rem 1.5rem">
  <div class="flex items-center gap-2 mb-6"><span style="color:var(--primary)">★</span><h2 class="text-2xl font-bold" data-i18n="courses.featured"></h2></div>
  <div id="featured" class="grid grid-2"></div>

    <div id="skills-container">

    <div class="skill-block" data-skill="Foundation">
      <h2 class="skill-title">
        <img src="../images/FoundationIcon.png" class="skill-main-icon">
        <span data-i18n="section.Foundation"></span>
      </h2>

      <div class="skill-filters" id="foundation-filters"></div>
      <div class="skill-grid" id="foundation-grid"></div>

      
    </div>

  <div class="card card-lg text-center" style="margin-top:5rem;padding:2.5rem">

    <h3 class="h2" data-i18n="courses.cta.title"></h3>
    <p class="muted mt-3" style="max-width:28rem;margin-left:auto;margin-right:auto" data-i18n="courses.cta.desc"></p>
    <a href="test.html" class="cta cta-lg mt-6"><span data-i18n="courses.cta.button"></span> →</a>
  </div>
</main>

<script>


const SKILL_COURSES = {
  Foundation: {
    All: [
      { key: "foundation", level: "Free", title: "Foundation Course", price: "Free" }
    ],
    Free: [
      { key: "foundation", level: "Free", title: "Foundation Course", price: "Free" }
    ]
  }
};

function renderCourses(){
  const lang = getLang();

  // 1) نفس جزء الـ featured القديم (ما غيرناه)

  // 🔹 إعادة بناء قسم Featured courses
const featuredContainer = document.getElementById("featured");
if (featuredContainer) {
  featuredContainer.innerHTML = COURSES.filter(c => c.featured).map(c => `
    <article class="card" style="background:var(--card);color:var(--foreground)">
      <div class="flex items-center gap-2">
        <span class="lvl-pill lvl-pill-sm">${c.level}</span>
        <span class="muted text-sm">${c.category[lang]}</span>
      </div>
      <h3 class="text-lg font-semibold mt-3">${c.title[lang]}</h3>
      <p class="muted text-sm mt-2">${c.description[lang]}</p>
      <div class="mt-4 flex items-center gap-4 muted text-xs">
        <span>⏱ ${c.duration[lang]}</span>
        <span>📖 ${formatNumber(c.lessons)} ${t("courses.lessons")}</span>
      </div>
      <div class="mt-5 flex items-center justify-between" style="border-top:1px solid var(--border);padding-top:1rem">
        <span class="font-bold">
  ${
    c.price[lang] === "Free" || c.price[lang] === "مجاني"
      ? (lang === "ar" ? "مجاني" : "Free")
      : `${formatNumber(c.price[lang])} ⃁`
  }
</span>
        <a href="#" class="cta text-sm font-semibold">${t("courses.enroll")} →</a>
      </div>
    </article>
  `).join('');
}
  
  const LEVELS = {
    Foundation: ["All", "Free"]
  };
  const SKILLS = ["Foundation"];

  // 2) نبني الفلاتر لكل مهارة (أيقونات فقط)
  SKILLS.forEach(skill => {
    document.getElementById(`${skill.toLowerCase()}-filters`).innerHTML =
  LEVELS[skill].map(level => {

  let label = level;

  if(level === "All"){
    label = t("filter.all");
  }
  else if(level === "Free"){
    label = t("filter.free");
  }
  else if(level.startsWith("+")){
  const num = level.replace("+","");

  label = getLang() === "ar"
    ? "+" + num.replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d])
    : level;
}

  return `
    <button class="filter-btn"
      onclick="setActiveFilter(this, '${skill}', '${level}')">
      ${label}
    </button>
  `;
}).join('');

    // أول ما تفتح الصفحة: نعرض All لكل مهارة
    renderSkill(skill, "All");
  });
}

function setActiveFilter(btn, skill, level){
  // إزالة التفعيل من كل الأزرار داخل نفس المهارة
  document.querySelectorAll(`#${skill.toLowerCase()}-filters .filter-btn`)
    .forEach(b => b.classList.remove('active-filter'));

  // تفعيل الزر الحالي
  btn.classList.add('active-filter');

  // عرض الكورسات
  renderSkill(skill, level);
}

function formatNumber(num){
  const lang = getLang();

  // تحويل النص إلى رقم لو أمكن
  const n = Number(num);

  // لو ما قدر يتحول (مثل Free) نرجعه كما هو
  if (isNaN(n)) return num;

  return lang === "ar"
    ? n.toLocaleString("ar-EG")
    : n.toLocaleString("en-US");
}

function renderSkill(skill, level){
  const courses = SKILL_COURSES[skill][level];

    const courseCards = courses.map((c) => `
    <article class="card" style="display:flex;flex-direction:column">

      <div class="flex items-center gap-2">
        <span class="lvl-pill lvl-pill-sm">
          ${
  c.level === "Free"
    ? (getLang() === "ar" ? "مجاني" : "Free")
    : c.level.startsWith("+")
      ? "+" + formatNumber(c.level.replace("+",""))
      : c.level
}
        </span>
      </div>

      <h3 class="text-lg font-semibold mt-3">
  ${t(`skill.${c.key}.title`) !== `skill.${c.key}.title`
      ? t(`skill.${c.key}.title`)
      : c.title}
</h3>

      <p class="muted text-sm mt-2">
  ${t(`skill.${c.key}.desc`) !== `skill.${c.key}.desc`
      ? t(`skill.${c.key}.desc`)
      : "Course description here…"}
</p>

      <div class="mt-4 flex items-center gap-4 muted text-xs">
        <span>
⏱ ${
  t(`skill.${c.key}.duration`) !== `skill.${c.key}.duration`
    ? t(`skill.${c.key}.duration`)
    : "2 hours"
}
</span>
        <span>
📖 ${
  t(`skill.${c.key}.lessons`) !== `skill.${c.key}.lessons`
    ? t(`skill.${c.key}.lessons`)
    : "10 lessons"
}
</span>
      </div>

      <div class="mt-5 flex items-center justify-between" style="border-top:1px solid var(--border);padding-top:1rem">
        <span class="font-bold">
  ${
  c.price === "Free"
    ? (getLang() === "ar" ? "مجاني" : "Free")
    : `${formatNumber(c.price)} ⃁`
}
</span>
        <a href="#" class="text-primary text-sm font-semibold">
  ${t("courses.details")} →
</a>
      </div>

    </article>
  `).join('');

  document.getElementById(`${skill.toLowerCase()}-grid`).innerHTML = courseCards;
}


</script>
